services:
    postgresql:
      image: postgres:15
      container_name: temporal-postgres
      environment:
          POSTGRES_PASSWORD: temporal
          POSTGRES_USER: temporal
      networks:
          - temporal-network
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U temporal -d postgres"]
        interval: 2s
        timeout: 2s
        retries: 20
        start_period: 5s
      
    temporal:
      image: temporalio/auto-setup:latest
      container_name: temporal
      depends_on:
          postgresql:
              condition: service_healthy
      environment:
          - DB=postgres12
          - POSTGRES_USER=temporal
          - POSTGRES_PWD=temporal
          - POSTGRES_SEEDS=postgresql
      networks:
          - temporal-network
      ports:
          - '7233:7233'
    
    temporal-ui:
      image: temporalio/ui:2.26.2
      container_name: temporal-ui-gc
      depends_on:
          - temporal
      networks:
          - temporal-network
      ports:
          - '8082:8080'
networks:
    temporal-network:
        driver: bridge