  postgres-backend:
    container_name: postgres-backend
    image: postgres:15
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goodcollect_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d goodcollect_local -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 20s 
    networks:
      - app-network
  
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "7770:9000"
      - "7771:9001"
    environment:
      MINIO_ROOT_USER: thomas@goodcollect.co
      MINIO_ROOT_PASSWORD: 9sdf7csdfsd89fsadfsdaFASDFa7cf7894sd987fcsd
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network


volumes:
  minio_data:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
    name: app-network
  temporal-network:
    driver: bridge
    name: temporal-network
