name: Create PR to develop from tag
 
on:
  push:
    tags:
      - 'backend/**'
      - 'frontend/**'
 
jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Extract info from tag
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          TYPE=$(echo "$TAG" | cut -d'/' -f1)
          FEATURE=$(echo "$TAG" | cut -d'/' -f2)
          BRANCH_NAME="pr/${TYPE}/${FEATURE}"
 
          echo "tag=$TAG"                 >> $GITHUB_OUTPUT
          echo "type=$TYPE"               >> $GITHUB_OUTPUT
          echo "feature=$FEATURE"         >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
 
      - name: Create branch from tag
        run: |
          git checkout -b "${{ steps.extract.outputs.branch_name }}" "${{ steps.extract.outputs.tag }}"
          git push origin "${{ steps.extract.outputs.branch_name }}"
 
      - name: Create Pull Request via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head "${{ steps.extract.outputs.branch_name }}" \
            --title "[${{ steps.extract.outputs.type }}] Merge ${{ steps.extract.outputs.feature }} → develop" \
            --body "## 📦 PR générée automatiquement
 
          | Champ       | Valeur |
          |-------------|--------|
          | **Type**    | \`${{ steps.extract.outputs.type }}\` |
          | **Feature** | \`${{ steps.extract.outputs.feature }}\` |
          | **Tag**     | \`${{ steps.extract.outputs.tag }}\` |
          | **Branche** | \`${{ steps.extract.outputs.branch_name }}\` |
          | **Cible**   | \`develop\` |
 
          > Cette PR a été créée automatiquement depuis le tag \`${{ steps.extract.outputs.tag }}\`." \
            --label "${{ steps.extract.outputs.type }}" \
            --label "auto-pr"